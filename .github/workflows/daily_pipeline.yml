name: Daily GDELT AI Intelligence Desk

# When should this run?
on:
  schedule:
    # Runs automatically at 8:00 AM UTC (4:00 AM Eastern) every day
    - cron: '0 7 * * *'
  workflow_dispatch: # This adds a "Run Now" button so you can trigger it manually!

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: ☁️ Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: 💾 Download Database from Google Cloud
        run: |
          mkdir -p gdelt_Data
          gcloud storage cp gs://gdelt-intelligence-bucket/gdelt_brain.db ./gdelt_Data/gdelt_brain.db

      - name: 🐳 Build and Run Docker Container
        run: |
          docker build -t gdelt-ai-desk .
          # Mount the workspace and pass ALL secrets into the container
          docker run -v ${{ github.workspace }}:/app \
            -e DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}" \
            -e EMAIL_APP_PASSWORD="${{ secrets.EMAIL_APP_PASSWORD }}" \
            -e MY_SECRET_EMAIL="${{ secrets.MY_SECRET_EMAIL }}" \
            -e SENDER_EMAIL="${{ secrets.SENDER_EMAIL }}" \
            gdelt-ai-desk
      
      - name: 📤 Upload Updated Database to Google Cloud
        run: |
          gcloud storage cp ./gdelt_Data/gdelt_brain.db gs://gdelt-intelligence-bucket/gdelt_brain.db

      - name: 📊 Save AI Briefing HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: Daily-AI-Intelligence-Briefing
          path: ./*.html oh please I come bearing gifts
