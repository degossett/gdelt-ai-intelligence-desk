name: 📊 Manual Intelligence Stats

# This tells GitHub to ONLY run this when you manually click the button
on:
  workflow_dispatch: 

jobs:
  run-stats:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: ☁️ Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: 💾 Download Database from Google Cloud
        run: |
          mkdir -p gdelt_Data
          # NOTE: Change to oil_gas_brain.db if you are putting this in the O&G repository!
          gcloud storage cp gs://gdelt-intelligence-bucket/gdelt_brain.db ./gdelt_Data/gdelt_brain.db || echo "No existing DB found."

      - name: 🧮 Run Stats Script
        # We run this natively on Ubuntu's default Python without Docker for lightning speed
        run: python3 13_intelligence_stats.py
